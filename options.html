<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Autoresponder</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <h1>Disparadores</h1>
  <form id="new">
    <input id="pattern" placeholder="palabra o regex" required>
    <label><input type="checkbox" id="isRegex"> Regex</label>
    <label><input type="checkbox" id="caseSensitive"> Mayúsc/minúsc</label>
    <select id="inGroups">
      <option value="all">Chats y grupos</option>
      <option value="only">Solo grupos</option>
      <option value="never">Nunca grupos</option>
    </select>
    <input id="cooldown" type="number" min="0" value="0" style="width:90px"> s
    <textarea id="reply" placeholder="Respuesta" required></textarea>
    <button type="submit">Agregar</button>
  </form>

  <ul id="list"></ul>
  <script src="options.js"></script>
</body>
</html>
